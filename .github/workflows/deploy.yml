name: Deploy Interactive Textbook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'interactive-textbook/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          echo "=== Interactive Textbook Files ==="
          ls -lh interactive-textbook/
          echo ""
          echo "=== File count ==="
          find interactive-textbook/ -name "*.html" | wc -l
          echo " HTML files found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: interactive-textbook

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output URL
        run: |
          echo "============================================"
          echo "  Site deployed successfully!"
          echo "  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "============================================"
