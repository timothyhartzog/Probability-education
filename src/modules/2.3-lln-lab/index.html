<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laws of Large Numbers Lab | Probability Education</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="../../assets/design-system.css">
  <link rel="stylesheet" href="../../assets/module-template.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="module-page">
    <header class="module-header">
      <nav class="breadcrumb"><a href="../../../index.html">Home</a> / <a href="../../../index.html#convergence">Convergence</a> / Laws of Large Numbers</nav>
      <h1>Laws of Large Numbers Laboratory</h1>
      <p class="module-subtitle">Watch running averages converge (or fail to converge) as tail behavior changes</p>
    </header>
    <div class="module-layout">
      <div class="viz-area">
        <div class="viz-container" id="main-chart">
          <h3>Running Averages S<sub>n</sub>/n</h3>
          <div class="chart-area"></div>
        </div>
        <div class="secondary-panels">
          <div class="viz-container" id="histogram-panel">
            <h3>Distribution of S<sub>n</sub>/n at fixed n</h3>
            <div class="chart-area"></div>
          </div>
          <div class="viz-container" id="rate-panel">
            <h3>Convergence Rate (log-log)</h3>
            <div class="chart-area"></div>
          </div>
        </div>
      </div>
      <aside class="control-panel" id="controls"></aside>
    </div>
    <div class="info-panel" id="info"></div>
  </div>
  <script type="module" src="./module.js"></script>
</body>
</html>
